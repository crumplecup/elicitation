name: Satellite

# Run on demand to test all elicit_* satellite crates.
# Cross-platform compilation is already covered by the lint job in ci.yml.
on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test-satellite:
    name: Test satellite crates (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libasound2-dev libudev-dev libproj-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: satellite-ubuntu-${{ hashFiles('Cargo.lock') }}

      - name: Test proof harness crates
        run: |
          cargo test -p elicitation_rand
          cargo test -p elicitation_creusot
          cargo test -p elicitation_kani
          cargo test -p elicit_proofs
          # elicitation_verus: excluded — requires verus toolchain

      - name: Test type and primitive crates
        run: |
          cargo test -p elicit_accesskit
          cargo test -p elicit_axum
          cargo test -p elicit_bevy
          cargo test -p elicit_chrono
          cargo test -p elicit_clap
          cargo test -p elicit_csv
          cargo test -p elicit_db
          cargo test -p elicit_egui
          cargo test -p elicit_geo
          cargo test -p elicit_geo_types
          cargo test -p elicit_geojson
          cargo test -p elicit_georaster
          cargo test -p elicit_gis
          cargo test -p elicit_jiff
          cargo test -p elicit_leptos
          cargo test -p elicit_polars
          cargo test -p elicit_proj
          cargo test -p elicit_ratatui
          cargo test -p elicit_redb
          cargo test -p elicit_regex
          cargo test -p elicit_reqwest
          cargo test -p elicit_rstar
          cargo test -p elicit_serde
          cargo test -p elicit_serde_json
          cargo test -p elicit_std
          cargo test -p elicit_surrealdb
          cargo test -p elicit_time
          cargo test -p elicit_tokio
          cargo test -p elicit_toml
          cargo test -p elicit_tower
          cargo test -p elicit_ui
          cargo test -p elicit_uom
          cargo test -p elicit_url
          cargo test -p elicit_uuid
          cargo test -p elicit_wgpu
          cargo test -p elicit_winit
          cargo test -p elicit_wkb
          cargo test -p elicit_wkt

      - name: Test server and database crates
        run: |
          # ci feature gates emit smoke tests (they spawn nested cargo processes)
          cargo test -p elicit_server --features ci
          cargo test -p elicit_sqlx
