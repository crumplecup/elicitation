name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # All platforms: fmt + clippy only (proves cross-platform compilation)
  lint:
    name: Lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            extra_exclude: ""
          - os: windows-latest
            # proj-sys requires sqlite3 executable for cmake build
            extra_exclude: "--exclude elicit_proj"
          - os: macos-latest
            extra_exclude: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libasound2-dev libudev-dev

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install proj

      - name: Install system dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install sqlite --no-progress -y

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: lint-${{ matrix.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets ${{ matrix.extra_exclude }} -- -D warnings

  # Ubuntu only: per-package testing avoids feature unification and disk exhaustion.
  # Each `cargo test -p <crate>` builds only that crate's feature set independently.
  test:
    name: Test (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libasound2-dev libudev-dev libproj-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: test-ubuntu-${{ hashFiles('Cargo.lock') }}

      - name: Test core library and derive macros
        run: |
          cargo test -p elicitation
          cargo test -p elicitation_derive
          cargo test -p elicitation_derive --features "chrono,time,jiff,uuid,url"
          cargo test -p elicitation_macros

      - name: Test proof harness crates (compile + 0 tests)
        run: |
          cargo test -p elicitation_rand
          cargo test -p elicitation_creusot
          cargo test -p elicitation_kani
          cargo test -p elicit_proofs
          # elicitation_verus: excluded — requires verus toolchain

      - name: Test type and primitive crates
        run: |
          cargo test -p elicit_accesskit
          cargo test -p elicit_axum
          cargo test -p elicit_bevy
          cargo test -p elicit_chrono
          cargo test -p elicit_clap
          cargo test -p elicit_csv
          cargo test -p elicit_db
          cargo test -p elicit_egui
          cargo test -p elicit_geo
          cargo test -p elicit_geo_types
          cargo test -p elicit_geojson
          cargo test -p elicit_georaster
          cargo test -p elicit_gis
          cargo test -p elicit_jiff
          cargo test -p elicit_leptos
          cargo test -p elicit_polars
          cargo test -p elicit_proj
          cargo test -p elicit_ratatui
          cargo test -p elicit_redb
          cargo test -p elicit_regex
          cargo test -p elicit_reqwest
          cargo test -p elicit_rstar
          cargo test -p elicit_serde
          cargo test -p elicit_serde_json
          cargo test -p elicit_std
          cargo test -p elicit_surrealdb
          cargo test -p elicit_time
          cargo test -p elicit_tokio
          cargo test -p elicit_toml
          cargo test -p elicit_tower
          cargo test -p elicit_ui
          cargo test -p elicit_uom
          cargo test -p elicit_url
          cargo test -p elicit_uuid
          cargo test -p elicit_wgpu
          cargo test -p elicit_winit
          cargo test -p elicit_wkb
          cargo test -p elicit_wkt

      - name: Test server and database crates
        run: |
          # ci feature gates emit smoke tests (they spawn nested cargo processes)
          cargo test -p elicit_server --features ci
          cargo test -p elicit_sqlx
