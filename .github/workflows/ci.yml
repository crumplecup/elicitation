name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # All platforms: fmt + clippy only (proves cross-platform compilation)
  lint:
    name: Lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            extra_exclude: ""
          - os: windows-latest
            # proj-sys requires sqlite3 executable for cmake build
            extra_exclude: "--exclude elicit_proj"
          - os: macos-latest
            extra_exclude: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libasound2-dev libudev-dev

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install proj

      - name: Install system dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install sqlite --no-progress -y

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: lint-${{ matrix.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets ${{ matrix.extra_exclude }} -- -D warnings

  # Ubuntu only: core library tests on every push.
  # Satellite crates (elicit_*) are tested via satellite.yml on demand.
  test:
    name: Test core (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: test-core-ubuntu-${{ hashFiles('Cargo.lock') }}

      - name: Test core library and derive macros
        run: |
          cargo test -p elicitation
          cargo test -p elicitation_derive
          cargo test -p elicitation_derive --features "chrono,time,jiff,uuid,url"
          cargo test -p elicitation_macros
