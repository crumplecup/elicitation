name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            extra_exclude: ""
          - os: windows-latest
            # proj-sys requires building PROJ from source via cmake+sqlite3
            # which is not available on the Windows runner. Skip elicit_proj.
            extra_exclude: "--exclude elicit_proj"
          - os: macos-latest
            extra_exclude: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libasound2-dev libudev-dev

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install proj

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Separate cache per OS and Cargo.lock hash
          key: ${{ matrix.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets ${{ matrix.extra_exclude }} -- -D warnings

      - name: Test workspace (default features)
        run: cargo test --workspace ${{ matrix.extra_exclude }}

      - name: Test derive — all third-party feature combinations
        run: cargo test -p elicitation_derive --features "chrono,time,jiff,uuid,url"

      - name: Test elicit_server smoke suite
        run: cargo test -p elicit_server --features emit
