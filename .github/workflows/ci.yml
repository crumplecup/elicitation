name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Separate cache per OS and Cargo.lock hash
          key: ${{ matrix.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test workspace (default features)
        run: cargo test --workspace

      - name: Test derive — all third-party feature combinations
        run: cargo test -p elicitation_derive --features "chrono,time,jiff,uuid,url"

      - name: Test elicit_server smoke suite
        run: cargo test -p elicit_server --features emit

  feature-powerset:
    name: Feature powerset (cargo-hack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: feature-powerset-${{ hashFiles('Cargo.lock') }}

      - name: Install cargo-hack
        run: cargo install cargo-hack --locked

      - name: Feature powerset check (depth 2)
        run: |
          cargo hack check \
            --workspace \
            --feature-powerset \
            --depth 2 \
            --exclude-features "full,dev,api,kani,proofs,verification,verify-verus,verify-all,cli,csv,tokio,unexpected_cfgs" \
            --exclude elicitation_kani \
            --exclude elicitation_creusot
