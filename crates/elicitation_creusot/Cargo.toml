[package]
name = "elicitation_creusot"
version.workspace = true
edition = "2024"
license.workspace = true
repository.workspace = true
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
description = "Creusot formal verification proofs for elicitation contract types"
keywords = ["verification", "creusot", "formal-methods", "deductive", "contracts"]
categories = ["development-tools", "mathematics"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(creusot)', 'cfg(kani)'] }

[dependencies]
creusot-std = { workspace = true }

# Import the contract types from main crate
elicitation = { workspace = true }

# External dependencies needed by proofs (feature-gated)
uuid = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
url = { workspace = true, optional = true }
regex = { workspace = true, optional = true }
chrono = { workspace = true, optional = true }
time = { workspace = true, optional = true }
jiff = { workspace = true, optional = true }
clap = { workspace = true, optional = true }
sqlx = { workspace = true, optional = true }
egui = { workspace = true, optional = true }
paste = { workspace = true, optional = true }
ratatui = { workspace = true, optional = true }
geo-types = { workspace = true, optional = true }
georaster = { workspace = true, optional = true }
geojson = { workspace = true, optional = true }
rstar = { workspace = true, optional = true }
proj = { workspace = true, optional = true }
tiff = { workspace = true, optional = true }
wkt = { workspace = true, optional = true }
wkb = { workspace = true, optional = true }
palette = { workspace = true, optional = true }
elicit_ui = { workspace = true, optional = true }
accesskit = { workspace = true, optional = true }

[features]
default = []
all = ["uuid", "serde_json", "url", "regex", "chrono", "time", "jiff"]
uuid = ["dep:uuid", "elicitation/uuid"]
serde_json = ["dep:serde_json", "elicitation/serde_json"]
url = ["dep:url", "elicitation/url"]
regex = ["dep:regex", "elicitation/regex"]
chrono = ["dep:chrono", "elicitation/chrono"]
time = ["dep:time", "elicitation/time"]
jiff = ["dep:jiff", "elicitation/jiff"]
verify-kani = []                                                       # Dummy feature for Kani compatibility
reqwest = ["elicitation/reqwest"]
clap-types = ["dep:clap", "elicitation/clap-types"]
sqlx-types = ["dep:sqlx", "elicitation/sqlx-types"]
tokio-types = []
egui-types = ["dep:egui", "dep:paste", "elicitation/egui-types"]
ratatui-types = ["dep:ratatui", "dep:paste", "elicitation/ratatui"]
geo-types = ["dep:geo-types", "elicitation/geo-types"]
georaster-types = ["dep:georaster", "dep:tiff", "elicitation/georaster-types"]
geojson-types = ["dep:geojson", "dep:serde_json", "elicitation/geojson-types"]
rstar-types = ["dep:rstar", "elicitation/rstar-types"]
proj-types = ["dep:proj", "elicitation/proj-types"]
wkt-types = ["dep:wkt", "elicitation/wkt-types"]
wkb-types = ["dep:wkb", "elicitation/wkb-types"]
palette = ["dep:palette", "elicitation/palette"]
ui-types = ["dep:elicit_ui", "dep:accesskit"]
