[package]
name = "elicit_url"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
description = "Elicitation-enabled url::Url wrapper with MCP reflect methods"
keywords = ["mcp", "url", "elicitation", "jsonschema", "tools"]
categories = ["development-tools", "web-programming"]

[dependencies]
elicitation = { workspace = true, features = ["url"] }
elicitation_derive.workspace = true
url = { workspace = true }
schemars = { workspace = true, features = ["url2"] }
serde.workspace = true
serde_json.workspace = true
derive_builder.workspace = true
rmcp.workspace = true
tracing.workspace = true
futures.workspace = true

# Code recovery (optional)
proc-macro2 = { workspace = true }
quote = { workspace = true, optional = true }

[features]
emit = ["dep:quote", "elicitation/emit"]

[dev-dependencies]
serde_json.workspace = true

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(kani)', 'cfg(creusot)', 'cfg(prusti)', 'cfg(verus)'] }
