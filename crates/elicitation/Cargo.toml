[package]
name = "elicitation"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true

description = "Conversational elicitation of strongly-typed Rust values via MCP"
keywords = ["mcp", "llm", "elicitation", "types", "async"]
categories = ["development-tools", "asynchronous"]

[package.metadata.verus]
verify = true

[dependencies]
rmcp = { workspace = true }
futures = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
schemars = { workspace = true }
erased-serde = { workspace = true }
derive_more = { workspace = true }
derive-getters = { workspace = true }
derive_setters = { workspace = true }
derive_builder = { workspace = true }
derive-new = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true }
paste = { workspace = true }
async-trait = { workspace = true }
inventory = { workspace = true }
anodized = { workspace = true }

# CLI dependencies (optional)
anyhow = { workspace = true }
clap = { workspace = true, optional = true }
csv = { workspace = true, optional = true }
shellexpand = { workspace = true, optional = true }
dirs = { workspace = true, optional = true }

# DateTime libraries (optional)
chrono = { workspace = true, optional = true }
time = { workspace = true, optional = true }
jiff = { workspace = true, optional = true }

# UUID library (optional)
uuid = { workspace = true, optional = true }

# Random number generation (optional)
rand = { workspace = true, optional = true }
rand_chacha = { workspace = true, optional = true }

# URL library (optional)
url = { workspace = true, optional = true }

# Regex library (optional)
regex = { workspace = true, optional = true }

# Reqwest HTTP client (optional)
reqwest = { workspace = true, optional = true }
http = { workspace = true, optional = true }
bytes = { workspace = true, optional = true }

# Code recovery / emission (optional)
proc-macro2 = { workspace = true, optional = true }
quote = { workspace = true, optional = true }
prettyplease = { workspace = true, optional = true }
syn = { workspace = true, optional = true }

# Re-export derive macro
elicitation_derive = { workspace = true }
elicitation_macros = { workspace = true }

[dev-dependencies]
tokio-test = { workspace = true }
tracing-subscriber = { workspace = true }
uuid = { workspace = true }
criterion = { workspace = true }
elicit_time = { path = "../elicit_time" }
elicit_regex = { path = "../elicit_regex" }
elicit_reqwest = { path = "../elicit_reqwest" }
elicit_chrono = { path = "../elicit_chrono" }
elicit_url = { path = "../elicit_url" }
elicit_jiff = { path = "../elicit_jiff" }

[features]
default = ["full"]

# Full feature bundle - all third-party support + rand
full = ["chrono", "time", "jiff", "uuid", "url", "regex", "rand", "reqwest", "proofs", "verification"]

# Feature for tests that call real API (rate-limited)
api = []
# Enable serde derives on elicitation's own types + erased-serde registry
serde = []
# Enable serde_json::Value elicitation
serde_json = []
# Enable chrono datetime elicitation (+ JsonSchema via schemars/chrono04)
chrono = ["dep:chrono", "schemars/chrono04"]
# Enable time datetime elicitation (schemars has no time support — needs elicit_time)
time = ["dep:time"]
# Enable jiff datetime elicitation (+ JsonSchema via schemars/jiff02)
jiff = ["dep:jiff", "schemars/jiff02"]
# Enable UUID elicitation (+ JsonSchema via schemars/uuid1)
uuid = ["dep:uuid", "schemars/uuid1"]
# Enable rand RNG elicitation
rand = ["dep:rand", "dep:rand_chacha"]
# Enable URL elicitation (+ JsonSchema via schemars/url2)
url = ["dep:url", "schemars/url2"]
# Enable Regex elicitation
regex = ["dep:regex"]
# Enable reqwest HTTP client elicitation
reqwest = ["dep:reqwest", "dep:http", "dep:bytes", "url"]

# Code recovery — emit verified workflows as Rust source
emit = ["dep:prettyplease", "dep:syn", "proofs"]

# Proof emission — proc_macro2/quote for kani/verus/creusot/prusti proof methods
proofs = ["dep:proc-macro2", "dep:quote", "elicitation_derive/proofs"]

# Type graph visualization — inventory-based structural registry + renderers

# Formal verification support
verification = [] # Core Contract trait only
# verify-kani lives in elicitation_kani crate (dedicated)
verify-verus = ["verification"] # Verus SMT verifier
verify-all = ["verify-verus"]

# CLI and verification runner
cli = ["clap", "csv", "chrono", "shellexpand", "dirs"]

# Development (all optional features + CLI)
dev = ["full", "cli"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
  'cfg(kani)',
  'cfg(prusti)',
  'cfg(creusot)',
  'cfg(verus)',
] }

[[bin]]
name = "elicitation"
path = "src/main.rs"
required-features = ["cli"]
