[package]
name = "elicitation"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true

description = "Conversational elicitation of strongly-typed Rust values via MCP"
keywords = ["mcp", "formal-verification", "agent", "state-machine", "contracts"]
categories = ["artificial-intelligence", "development-tools", "asynchronous"]

[package.metadata.verus]
verify = true

[dependencies]
rmcp = { workspace = true }
futures = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
schemars = { workspace = true }
erased-serde = { workspace = true }
derive_more = { workspace = true }
derive-getters = { workspace = true }
derive_setters = { workspace = true }
derive_builder = { workspace = true }
derive-new = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true }
paste = { workspace = true }
async-trait = { workspace = true }
inventory = { workspace = true }
anodized = { workspace = true }
hex = { workspace = true, optional = true }

# CLI dependencies (optional)
anyhow = { workspace = true }
clap = { workspace = true, optional = true }
csv = { workspace = true, optional = true }
toml = { workspace = true, optional = true }
toml_datetime = { workspace = true, optional = true }
shellexpand = { workspace = true, optional = true }
dirs = { workspace = true, optional = true }
dotenvy = { workspace = true, optional = true }
indicatif = { workspace = true, optional = true }
tracing-subscriber = { workspace = true, optional = true }

# DateTime libraries (optional)
chrono = { workspace = true, optional = true }
time = { workspace = true, optional = true }
jiff = { workspace = true, optional = true }

# UUID library (optional)
uuid = { workspace = true, optional = true }

# Random number generation (optional)
rand = { workspace = true, optional = true }
rand_chacha = { workspace = true, optional = true }

# URL library (optional)
url = { workspace = true, optional = true }

# Regex library (optional)
regex = { workspace = true, optional = true }

# Reqwest HTTP client (optional)
reqwest = { workspace = true, optional = true }
http = { workspace = true, optional = true }
bytes = { workspace = true, optional = true }

# sqlx database types (optional)
sqlx = { workspace = true, optional = true }

# Code recovery / emission (optional)
proc-macro2 = { workspace = true }
quote = { workspace = true }
prettyplease = { workspace = true }
syn = { workspace = true }
walkdir = { workspace = true, optional = true }

# GeoRust spatial types (optional)
geo-types = { workspace = true, optional = true }
geo = { workspace = true, optional = true }
proj = { workspace = true, optional = true }
rstar = { workspace = true, optional = true }
# redb types (optional)
redb = { workspace = true, optional = true }
georaster = { workspace = true, optional = true }
geojson = { workspace = true, optional = true }
tiff = { workspace = true, optional = true }

# Windowing / input (optional)
winit = { workspace = true, optional = true }

# GPU rendering (optional)
wgpu = { workspace = true, optional = true }

# Bevy game engine types (optional)
bevy = { workspace = true, optional = true }

# Well-Known Text spatial format (optional)
wkt = { workspace = true, optional = true }
wkb = { workspace = true, optional = true }

# Tower middleware types (optional)
tower = { workspace = true, features = ["full"], optional = true }
tower-http = { workspace = true, features = ["full"], optional = true }

# Color science (optional)
palette = { workspace = true, optional = true }

# Re-export derive macro
elicitation_derive = { workspace = true }
accesskit = { workspace = true, optional = true }
egui = { workspace = true, optional = true }
egui-winit = { workspace = true, optional = true }
ratatui = { workspace = true, optional = true }
strum = { workspace = true, optional = true }

[target.'cfg(unix)'.dependencies]

[dev-dependencies]
tokio-test = { workspace = true }
tracing-subscriber = { workspace = true }
uuid = { workspace = true }
criterion = { workspace = true }
tempfile = { workspace = true }

[features]
default = ["full"]

# Full feature bundle - all third-party support + rand
full = ["chrono", "time", "jiff", "uuid", "url", "regex", "rand", "reqwest", "graph", "clap-types", "sqlx-types", "ratatui", "geo-types", "geo", "proj-types", "rstar-types", "georaster-types", "geojson-types", "tower-types", "axum-types", "polars-types", "uom-types", "leptos-types", "wkt-types", "wkb-types", "winit-types", "wgpu-types", "bevy-types", "egui-winit-types", "redb-types", "csv-types", "toml-types", "emit", "accesskit"]

# Feature for tests that call real API (rate-limited)
api = []
# Enable serde derives on elicitation's own types + erased-serde registry
serde = []
# Enable serde_json::Value elicitation
serde_json = []
# Enable chrono datetime elicitation (+ JsonSchema via schemars/chrono04)
chrono = ["dep:chrono", "schemars/chrono04"]
# Enable time datetime elicitation (schemars has no time support — needs elicit_time)
time = ["dep:time"]
# Enable jiff datetime elicitation (+ JsonSchema via schemars/jiff02)
jiff = ["dep:jiff", "schemars/jiff02"]
# Enable UUID elicitation (+ JsonSchema via schemars/uuid1)
uuid = ["dep:uuid", "schemars/uuid1"]
# Enable rand RNG elicitation
rand = ["dep:rand", "dep:rand_chacha"]
# Enable URL elicitation (+ JsonSchema via schemars/url2)
url = ["dep:url", "schemars/url2"]
# Enable Regex elicitation
regex = ["dep:regex"]
# Enable reqwest HTTP client elicitation
reqwest = ["dep:reqwest", "dep:http", "dep:bytes", "url"]

# Code recovery — emit verified workflows as Rust source
emit = []

# Proof emission — proc_macro2/quote for kani/verus/creusot/prusti proof methods

# Type graph visualization — inventory-based structural registry + renderers
graph = []

# Static prompt tree — PromptTree, ElicitPromptTree, assembled_prompts()

# AccessKit tree bridge — PromptTree::to_accesskit_tree()
prompt-tree-accesskit = ["dep:accesskit"]

# Formal verification support
# verify-kani lives in elicitation_kani crate (dedicated)
verify-verus = []
verify-all = ["verify-verus"]

# Enable clap type elicitation (ColorChoice, ArgAction, ValueHint, etc.)
clap-types = ["dep:clap"]

# Enable sqlx type elicitation (AnyTypeInfoKind, ErrorKind, ColumnValue, etc.)
sqlx-types = ["dep:sqlx"]

# CLI and verification runner
cli = ["dep:clap", "dep:walkdir", "clap-types", "csv-types", "chrono", "shellexpand", "dirs", "dep:dotenvy", "dep:indicatif", "dep:tracing-subscriber", "dep:toml"]

# Development (all optional features + CLI)
dev = ["full", "cli", "graph"]
accesskit = ["dep:accesskit", "uuid"]
egui-types = ["dep:egui"]
ratatui = ["dep:ratatui"]
geo-types = ["dep:geo-types"]
geo = ["dep:geo", "geo-types"]
proj-types = ["dep:proj", "geo-types"]
rstar-types = ["dep:rstar", "geo-types"]
georaster-types = ["dep:georaster", "dep:tiff"]
geojson-types = ["dep:geojson", "geo-types", "serde_json"]
# Enable wkt spatial format type elicitation
wkt-types = ["dep:wkt", "geo-types"]
# Enable wkb spatial format type elicitation
wkb-types = ["dep:wkb", "dep:hex"]
# Enable redb embedded key-value store type elicitation
redb-types = ["dep:redb"]
# Enable csv reader/writer type elicitation
csv-types = ["dep:csv"]
# Enable toml/toml_datetime type elicitation
toml-types = ["dep:toml", "dep:toml_datetime"]
# Windowing / input (optional)
winit-types = ["dep:winit"]
# Enable wgpu GPU descriptor type elicitation
wgpu-types = ["dep:wgpu"]
# Enable Bevy game engine type elicitation
bevy-types = [
    "dep:bevy",
    "bevy/bevy_animation",
    "bevy/bevy_audio",
    "bevy/bevy_camera",
    "bevy/bevy_color",
    "bevy/bevy_core_pipeline",
    "bevy/bevy_light",
    "bevy/bevy_mesh",
    "bevy/bevy_pbr",
    "bevy/bevy_picking",
    "bevy/bevy_render",
    "bevy/bevy_sprite",
    "bevy/bevy_text",
    "bevy/bevy_ui",
    "bevy/gamepad",
    "bevy/serialize",
]
# Enable egui + winit integration descriptor type elicitation
egui-winit-types = ["dep:egui-winit", "egui-types", "winit-types", "strum"]
# Enable tower middleware type elicitation
tower-types = ["dep:tower", "dep:tower-http"]
# Enable axum descriptor type support (router, handler, response, serve descriptors)
axum-types = ["uuid"]
# Enable polars descriptor type support (pipeline, join, dtype descriptors)
polars-types = ["uuid"]
uom-types = []
leptos-types = ["strum"]
palette = ["dep:palette"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
  'cfg(kani)',
  'cfg(prusti)',
  'cfg(creusot)',
  'cfg(verus)',
] }

[[bin]]
name = "elicitation"
path = "src/main.rs"
required-features = ["cli"]
