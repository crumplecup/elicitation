[package]
name = "elicit_uom"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
description = "Elicitation-enabled uom shadow crate — MCP tools for units-of-measurement"
keywords = ["mcp", "uom", "units", "physics", "elicitation"]
categories = ["science", "mathematics"]

[dependencies]
elicitation = { workspace = true, features = ["uom-types", "emit"] }
uom = { version = "0.38", features = ["f64", "si", "autoconvert"] }
rmcp = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true, features = ["v4"] }
derive_more = { workspace = true }
futures = { workspace = true }

[dev-dependencies]
serde_json.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

[features]
default = []
emit = ["elicitation/emit"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(kani)', 'cfg(creusot)', 'cfg(prusti)', 'cfg(verus)'] }
