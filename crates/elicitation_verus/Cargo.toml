[package]
name = "elicitation_verus"
version = "0.11.1"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/crumplecup/elicitation"
authors = ["Erik Rose <erik.w.rose@gmail.com>"]
homepage = "https://github.com/crumplecup/elicitation"
documentation = "https://docs.rs/elicitation_verus"

description = "Verus formal verification proofs for elicitation contract types"
keywords = [
  "verification",
  "verus",
  "formal-methods",
  "smt-verification",
  "contracts",
]
categories = ["development-tools::testing", "mathematics"]
readme = "README.md"

[package.metadata.verus]
verify = true

[dependencies]
elicitation = { version = "0.11.1" }
verus_builtin_macros = "0.0.0-2026-05-31-0205"
vstd = "0.0.0-2026-05-31-0205"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
  'cfg(verus)',
  'cfg(verus_verify_core)',
  'cfg(verus_keep_ghost)',
] }
