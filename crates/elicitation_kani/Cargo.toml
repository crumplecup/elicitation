[package]
name = "elicitation_kani"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
homepage.workspace = true
documentation.workspace = true

readme = "README.md"
description = "Kani model-checking proofs for elicitation contract types"
keywords = ["verification", "kani", "formal-methods", "model-checking", "contracts"]
categories = ["development-tools", "mathematics"]

[dependencies]
# Core dependency - verification framework only
elicitation = { workspace = true, features = ["verification"] }

# Serialization (for serde boundary proofs)
serde_json = { workspace = true, optional = true }

# Kani verifier
kani-verifier = { version = "0.67", optional = true }

# Feature-gated dependencies (match main crate)
chrono = { workspace = true, optional = true }
time = { workspace = true, optional = true }
jiff = { workspace = true, optional = true }
uuid = { workspace = true, optional = true }
url = { workspace = true, optional = true }
regex = { workspace = true, optional = true }

[features]
default = []
kani = ["dep:kani-verifier"]
chrono = ["dep:chrono", "elicitation/chrono"]
time = ["dep:time", "elicitation/time"]
jiff = ["dep:jiff", "elicitation/jiff"]
uuid = ["dep:uuid", "elicitation/uuid"]
url = ["dep:url", "elicitation/url"]
regex = ["dep:regex", "elicitation/regex"]
serde_json = ["dep:serde_json", "elicitation/serde_json"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(kani)'] }
