[package]
name = "elicit_surrealdb"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
description = "Elicitation-enabled SurrealDB type wrappers — newtype shadows exposing surrealdb-types API as MCP tools"
keywords = ["mcp", "surrealdb", "elicitation", "jsonschema", "reflect"]
categories = ["database", "development-tools"]

[features]
# Enable to run live-database integration tests (requires a running SurrealDB instance).
api = []

[dependencies]
elicitation = { workspace = true, features = ["surreal-types"] }
elicitation_derive.workspace = true
inventory.workspace = true
surrealdb-types.workspace = true
surrealdb.workspace = true
rust_decimal.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
rmcp.workspace = true
schemars.workspace = true
futures.workspace = true
uuid = { workspace = true, features = ["v4"] }
hex.workspace = true
proc-macro2.workspace = true
quote.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }
serde_json = { workspace = true }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(kani)', 'cfg(creusot)', 'cfg(prusti)', 'cfg(verus)'] }
