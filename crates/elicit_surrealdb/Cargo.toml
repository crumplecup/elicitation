[package]
name = "elicit_surrealdb"
version = "0.11.1"
edition = "2024"
license = "Apache-2.0 OR MIT"
repository = "https://github.com/crumplecup/elicitation"
authors = ["Erik Rose <erik.w.rose@gmail.com>"]
homepage = "https://github.com/crumplecup/elicitation"
documentation = "https://docs.rs/elicitation"
readme = "README.md"
description = "Elicitation-enabled SurrealDB type wrappers — newtype shadows exposing surrealdb-types API as MCP tools"
keywords = ["mcp", "surrealdb", "database", "elicitation", "agent"]
categories = ["database", "development-tools"]

[features]
# Enable to run live-database integration tests (requires a running SurrealDB instance).
api = []

[dependencies]
elicitation = { path = "../elicitation", version = "0.11.0", default-features = false, features = [
  "serde_json",
] }
elicitation_derive = { path = "../elicitation_derive", version = "0.11.0" }
inventory = "0.3"
surrealdb-types = "3.1.2"
surrealdb = { version = "3.1.2", features = [
  "protocol-ws",
  "protocol-http",
  "rustls",
  "kv-mem",
  "kv-surrealkv",
  "jwks",
  "http",
] }
rust_decimal = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
rmcp = { version = "1.7", features = ["client", "transport-io", "schemars"] }
schemars = { version = "1", features = ["derive"] }
futures = "0.3"
uuid = { version = "1", features = ["v4"] }
hex = "0.4"
proc-macro2 = "1"
quote = "1"
chrono = { version = "0.4", features = ["serde"] }
geo-types = "0.7"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
serde_json = "1"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
  'cfg(kani)',
  'cfg(creusot)',
  'cfg(prusti)',
  'cfg(verus)',
] }
