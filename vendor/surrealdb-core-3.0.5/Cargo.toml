[package]
edition = "2024"
name = "surrealdb-core"
version = "3.0.5"
authors = ["Tobie Morgan Hitchcock <tobie@surrealdb.com>"]
build = "build.rs"
publish = true
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A scalable, distributed, collaborative, document-graph database, for the realtime web"
homepage = "https://github.com/surrealdb/surrealdb"
documentation = "https://docs.rs/surrealdb-core/"
readme = "README.md"
keywords = [
    "database",
    "embedded-database",
    "key-value",
    "key-value-store",
    "kv-store",
]
categories = [
    "database-implementations",
    "data-structures",
    "embedded",
]
license-file = "LICENSE"
repository = "https://github.com/surrealdb/surrealdb"

[package.metadata.docs.rs]
rustdoc-args = [
    "--cfg",
    "docsrs",
]
features = [
    "kv-mem",
    "kv-rocksdb",
    "http",
    "scripting",
    "graphql",
]
targets = []

[package.metadata.cargo-machete]
ignored = [
    "md-5",
    "regex-syntax",
]

[features]
allocation-tracking = []
allocator = [
    "dep:jemallocator",
    "dep:mimalloc",
]
arbitrary = [
    "dep:arbitrary",
    "dep:regex-syntax",
    "regex-syntax/arbitrary",
    "rust_decimal/rust-fuzz",
    "geo-types/arbitrary",
    "uuid/arbitrary",
    "surrealdb-types/arbitrary",
]
default = [
    "kv-mem",
    "graphql",
]
graphql = ["dep:async-graphql"]
http = ["dep:reqwest"]
jwks = ["dep:reqwest"]
kv-indxdb = ["dep:indxdb"]
kv-mem = [
    "dep:surrealmx",
    "tokio/time",
    "dep:tempfile",
    "dep:ext-sort",
    "dep:affinitypool",
]
kv-rocksdb = [
    "dep:rocksdb",
    "tokio/time",
    "dep:tempfile",
    "dep:ext-sort",
    "dep:affinitypool",
]
kv-surrealkv = [
    "dep:surrealkv",
    "tokio/time",
    "dep:tempfile",
    "dep:ext-sort",
    "dep:affinitypool",
]
kv-tikv = [
    "dep:tikv",
    "tokio/time",
    "dep:tempfile",
    "dep:ext-sort",
]
ml = ["dep:surrealml-core"]
scripting = ["dep:js"]
surrealism = ["dep:surrealism-runtime"]
trace-doc-ops = []

