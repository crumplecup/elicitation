[package]
name = "geo"
version = "0.32.99"
edition = "2021"
description = "Shim: routes surrealdb-core's geo ^0.32 requirement to the workspace geo 0.33 crate."
license = "MIT OR Apache-2.0"

[dependencies]
geo-real = { package = "geo", version = "0.33" }
geo-types = "0.7"

[features]
default = []
use-serde = ["geo-real/use-serde", "geo-types/serde"]
